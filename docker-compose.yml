version: '3.8'

services:

  postgres:
    image: debezium/postgres:14
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d products_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.0.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  connect:
    image: debezium/connect:latest
    container_name: connect
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses

  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: products_read_db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/products_read_db --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  write-service:
    build:
      context: ./write-service
    container_name: write-service
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  read-service:
  build: ./read-service
  ports:
    - "8081:8081"
  depends_on:
    - kafka
    - mongo
  environment:
    - PORT=8081
    - MONGO_URL=mongodb://mongo:27017
    - MONGO_DB=products_read_db
    - KAFKA_BROKER=kafka:29092
    - KAFKA_TOPIC=pg-server.public.products
    - GROUP_ID=product-sync-group
  write-service:
  build: ./write-service
  ports:
    - "8080:8080"
  depends_on:
    - postgres
  environment:
    - PORT=8080
    - DB_HOST=postgres
    - DB_PORT=5432
    - DB_USER=user
    - DB_PASSWORD=password
    - DB_NAME=products_db
    